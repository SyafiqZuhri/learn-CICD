name: Robot Penguji dan Deployer Otomatis Anteraja

on:
  push:
    branches: [ "main" ]

jobs:
  tugas-cicd:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Ambil Kode Terbaru dari GitHub
      uses: actions/checkout@v4

nano .github/workflows/ci-robot.yaml    - name: 2. Beri Izin Eksekusi pada File Script
      run: chmod +x tes-kode.sh

    # --- DI SINI PROSES CI (QUALITY CONTROL) BERJALAN ---
    - name: 3. Jalankan Pengujian Otomatis (CI)
      run: ./tes-kode.sh

    # --- DI SINI PROSES CD (AUTOMATED DEPLOYMENT) BERJALAN ---
    - name: 4. Otomatis Deploy ke Server Produksi (CD)
      if: success() # Hanya jalan jika langkah nomor 3 (CI) lolos sukses!
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.GCP_IP }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        script: |
          mkdir -p ~/app-compose && cd ~/app-compose
          
          docker compose down || true

          cat << 'EOD' > package.json
          {
            "name": "sistem-logistik-anteraja",
            "dependencies": {
              "express": "^4.18.2",
              "redis": "^4.6.7"
            }
          }
          EOD

          # KODE APLIKASI UTAMA ANTERAJA
          cat << 'EOD' > server.js
          const express = require('express');
          const redis = require('redis');
          const os = require('os');
          const app = express();
          const client = redis.createClient({ url: 'redis://database-redis:6379' });

          async function startApp() {
              try { await client.connect(); } catch (err) {}
              
              // Fitur Utama: Cek Resi Anteraja
              app.get('/cek-resi', (req, res) => {
                  res.send({
                      status: "SUCCESS",
                      ekspedisi: "Anteraja Logistics",
                      no_resi: "ANTRJ123456789",
                      posisi: "Paket sedang disortir di Hub Jakarta Selatan"
                  });
              });

              // Halaman Dashboard Utama
              app.get('/', async (req, res) => {
                  try {
                      let totalPaket = await client.get('total_paket');
                      if (!totalPaket) totalPaket = 1000; // Simulasi data awal paket
                      totalPaket = parseInt(totalPaket) + 1;
                      await client.set('total_paket', totalPaket);
                      
                      const containerId = os.hostname();

                      res.send(`
                        <div style="font-family: Arial; text-align: center; margin-top: 50px;">
                          <h1 style="color: #e65100;">PROD-ENVIRONMENT: SISTEM SORTIR ANTERAJA 📦</h1>
                          <div style="background: #fff3e0; padding: 20px; border-radius: 10px; display: inline-block; border: 2px solid #ffb74d;">
                            <h3>🖥️ Dilayani oleh Mesin ID: <span style="color: #d32f2f;">${containerId}</span></h3>
                            <p style="font-size: 22px; color: #37474f;">Total Paket Ter-scan Hari Ini: <b>${totalPaket}</b> paket.</p>
                            <hr>
                            <p>Gunakan endpoint <a href="/cek-resi" target="_blank"><b>/cek-resi</b></a> untuk API Pelacakan.</p>
                          </div>
                        </div>
                      `);
                  } catch (error) {
                      res.send('<h1>Sistem database logistik sedang sinkronisasi... mohon refresh!</h1>');
                  }
              });
              app.listen(8080, '0.0.0.0', () => console.log('Sistem Anteraja Aktif!'));
          }
          startApp();
          EOD

          cat << 'EOD' > Dockerfile
          FROM node:20-alpine
          WORKDIR /app
          COPY package.json .
          RUN npm install
          COPY server.js .
          EXPOSE 8080
          CMD ["node", "server.js"]
          EOD

          cat << 'EOD' > docker-compose.yaml
          services:
            nginx-proxy:
              image: 'jc21/nginx-proxy-manager:latest'
              ports:
                - '80:80'
                - '81:81'
                - '443:443'
              volumes:
                - ./data:/data
                - ./letsencrypt:/etc/letsencrypt

            web-saya:
              build: .
              deploy:
                replicas: 2

            database-redis:
              image: redis:alpine

            monitoring-kuma:
              image: louislam/uptime-kuma:1
              restart: always
              volumes:
                - ./uptime-kuma-data:/app/data
          EOD

          docker compose up -d --build --remove-orphans
