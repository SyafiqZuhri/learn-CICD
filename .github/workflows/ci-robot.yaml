name: Robot Penguji dan Deployer Otomatis

on:
  push:
    branches: [ "main" ]

jobs:
  tugas-cicd:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Ambil Kode Terbaru dari GitHub
      uses: actions/checkout@v4

    - name: 2. Beri Izin Eksekusi pada File Script
      run: chmod +x tes-kode.sh aplikasi.sh

    - name: 3. Jalankan Pengujian Otomatis (CI)
      run: ./tes-kode.sh

    - name: 4. Otomatis Login GCP & Deploy Multi-Container (CD)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.GCP_IP }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        script: |
          mkdir -p ~/app-compose && cd ~/app-compose
          
          docker compose down || true

          cat << 'EOD' > package.json
          {
            "name": "web-database-zuhri",
            "dependencies": {
              "express": "^4.18.2",
              "redis": "^4.6.7"
            }
          }
          EOD

          cat << 'EOD' > server.js
          const express = require('express');
          const redis = require('redis');
          const os = require('os');
          const app = express();
          const client = redis.createClient({ url: 'redis://database-redis:6379' });
          client.on('error', (err) => console.log('Menunggu Redis...', err.message));

          async function startApp() {
              try { await client.connect(); } catch (err) {}
              app.get('/', async (req, res) => {
                  try {
                      let kunjungan = await client.get('kunjungan');
                      if (!kunjungan) kunjungan = 0;
                      kunjungan = parseInt(kunjungan) + 1;
                      await client.set('kunjungan', kunjungan);
                      
                      // Mengambil ID unik dari Container Docker yang melayani
                      const containerId = os.hostname();

                      res.send(`
                        <div style="font-family: Arial; text-align: center; margin-top: 50px;">
                          <h1 style="color: #2e7d32;">BOS ZUHRI! Web Ini Dilindungi Nginx & Load Balancer! 🔥</h1>
                          <div style="background: #e8f5e9; padding: 20px; border-radius: 10px; display: inline-block;">
                            <h3>🖥️ Dilayani oleh Container ID: <span style="color: #d32f2f;">${containerId}</span></h3>
                            <p style="font-size: 20px;">Total Kunjungan: <b>${kunjungan}</b> kali.</p>
                          </div>
                        </div>
                      `);
                  } catch (error) {
                      res.send('<h1>Database sedang memulai... refresh sebentar lagi!</h1>');
                  }
              });
              app.listen(8080, '0.0.0.0', () => console.log('Web menyala!'));
          }
          startApp();
          EOD

          cat << 'EOD' > Dockerfile
          FROM node:20-alpine
          WORKDIR /app
          COPY package.json .
          RUN npm install
          COPY server.js .
          EXPOSE 8080
          CMD ["node", "server.js"]
          EOD

          cat << 'EOD' > docker-compose.yaml
          services:
            nginx-proxy:
              image: 'jc21/nginx-proxy-manager:latest'
              ports:
                - '80:80'
                - '81:81'
                - '443:443'
              volumes:
                - ./data:/data
                - ./letsencrypt:/etc/letsencrypt

            # KITA GANDAKAN MENJADI 2 REPLIKA SEKALIGUS!
            web-saya:
              build: .
              deploy:
                replicas: 2

            database-redis:
              image: redis:alpine

            monitoring-kuma:
              image: louislam/uptime-kuma:1
              restart: always
              volumes:
                - ./uptime-kuma-data:/app/data
          EOD

          docker compose up -d --build --remove-orphans
